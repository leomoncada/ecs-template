# LocalStack for validating Terraform locally (without real AWS).
# Usage: docker compose -f docker-compose.localstack.yml up -d
# Then: pip install terraform-local && cd infra && tflocal init && tflocal plan -var-file=terraform.tfvars.localstack

services:
  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    ports:
      - "4566:4566"            # LocalStack Gateway
      - "4510-4559:4510-4559"  # external services port range
    environment:
      - SERVICES=s3,ec2,ecr,ecs,elasticloadbalancing,servicediscovery,logs,iam,sts
      - DEBUG=0
      - PERSISTENCE=0
      - LAMBDA_EXECUTOR=docker-reuse
    volumes:
      - localstack-data:/var/lib/localstack/volumes
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  localstack-data:
