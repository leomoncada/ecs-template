name: CI

on:
  push:
    branches: [main, staging, prod]
  pull_request:
    branches: [main, staging, prod]

env:
  AWS_REGION: us-east-1

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Backend lint (ruff)
        run: |
          pip install ruff
          cd backend && ruff check app/

      - name: Backend test
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx
          python -m pytest --tb=short -q

      - name: Backend dependency audit
        run: |
          pip install pip-audit
          cd backend && pip-audit -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Frontend install, lint and test
        run: |
          cd frontend
          npm install
          npm run lint
          npm run test

      - name: Frontend dependency audit
        run: |
          cd frontend && npm audit --audit-level=high

  infra-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform fmt
        run: terraform fmt -check -recursive infra/

      - name: Validate modules
        run: |
          for dir in infra/modules/vpc infra/modules/alb infra/modules/ecs infra/modules/cloudwatch-alarms; do
            echo "--- Validating $dir ---"
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
          done

      - uses: terraform-linters/setup-tflint@v6

      - name: TFLint
        run: |
          cd infra && tflint --recursive

      - name: Terraform tests
        run: |
          for dir in infra/modules/vpc infra/modules/alb infra/modules/ecs infra/modules/cloudwatch-alarms; do
            echo "--- Testing $dir ---"
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" test
          done

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Build only on staging; prod promotes the same image (see deploy.yml).
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        id: meta-backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:${GITHUB_SHA}
            ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        id: meta-frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY_FRONTEND }}:${GITHUB_SHA}
            ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY_FRONTEND }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
